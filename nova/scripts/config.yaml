# NOVA 18B Max-Efficiency Training Config
# Hardware: 8x H100-80G-PCIe-NVLink ($15.60/hr)
# Token budget: 18B tokens
# Estimated time: ~54 hours total (~$843)

# ─── Model ───────────────────────────────────────────────
model:
  config: "NOVA_1B_QWEN"        # from nova.model.config
  dtype: bfloat16                # NOT fp16 — STE needs bf16's dynamic range
  gradient_checkpointing: true
  fused_bitlinear: true          # drop-in FusedBitLinear replacement
  liger_kernels: true            # Liger fused RMSNorm/RoPE/CE
  torch_compile: true
  compile_mode: "max-autotune"
  compile_dynamic: false
  flash_attention: true

# ─── Resume ──────────────────────────────────────────────
resume:
  checkpoint: null               # set to /data/nova/ckpt_latest.pt
  strict: true

# ─── Batch ───────────────────────────────────────────────
batch:
  per_device_batch_size: 16
  gradient_accumulation_steps: 1
  effective_batch_size: 128      # 16 * 8 GPUs

# ─── Training ────────────────────────────────────────────
training:
  total_tokens: 18_000_000_000
  checkpoint_every_tokens: 500_000_000
  eval_every_tokens: 250_000_000
  async_checkpoint_interval_minutes: 15

# ─── Learning Rate — WSD Schedule ────────────────────────
lr:
  peak: 3.0e-4
  min: 3.0e-6
  warmup_steps: 2000
  stable_fraction: 0.80
  decay_fraction: 0.20
  decay_type: cosine

# ─── Distillation ────────────────────────────────────────
distillation:
  loss_type: adaptive_kl
  akl_alpha: 0.5                 # equal forward + reverse KL
  ce_alpha: 0.3                  # hard label cross-entropy weight
  distill_alpha: 0.7             # soft label AKL weight
  topk_K: 128
  temperature_start: 2.0
  temperature_end: 1.0
  temperature_schedule: linear

# ─── Sequence-Length Curriculum ───────────────────────────
curriculum:
  enabled: true
  start_seq_len: 128
  end_seq_len: 2048
  warmup_fraction: 0.15

# ─── Batch Size Warmup ──────────────────────────────────
batch_warmup:
  enabled: true
  start: 4                       # per GPU
  end: 16                        # per GPU
  warmup_fraction: 0.05

# ─── Regularization (anti-overfitting for 13.4 epochs) ───
regularization:
  dropout: 0.1
  stochastic_seq_len: true
  stochastic_seq_len_probs:
    1024: 0.1
    1536: 0.2
    2048: 0.7
  overfitting_gap_threshold: 0.3  # nats between train/eval

# ─── Sequence Packing ───────────────────────────────────
packing:
  enabled: true
  efficiency_target: 0.95

# ─── Optimizer ───────────────────────────────────────────
optimizer:
  type: adamw                    # 8-bit if bitsandbytes available
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0

# ─── Cached Logits ───────────────────────────────────────
cache:
  dir: null                      # set to /data/cached_logits/
  K: 128
  dtype_indices: int32           # int32 needed for Qwen 151K vocab
  dtype_values: bfloat16

# ─── Eval ────────────────────────────────────────────────
eval:
  holdout_fraction: 0.05         # 5% of unique tokens
  max_eval_batches: 100

# ─── Abort Conditions ────────────────────────────────────
abort:
  nan_lr_factor: 0.5             # LR *= 0.5 on NaN, reload checkpoint
  regression_lr_factor: 0.7      # LR *= 0.7 on 3 consecutive eval regressions
  gap_warn: 0.3                  # increase dropout, reduce LR
  gap_critical: 0.5              # STOP training
  min_throughput: 50000          # tokens/sec — warn if below
  min_gpu_util: 80               # percent — warn if below

# ─── Paths ───────────────────────────────────────────────
paths:
  output_dir: null               # set to /data/checkpoints/
  log_file: training.log
  cache_dir: null                # set to /data/cached_logits/

# ─── Hardware ────────────────────────────────────────────
hardware:
  cost_per_hour: 15.60
  budget_cap: 1000.0
  num_gpus: 8
