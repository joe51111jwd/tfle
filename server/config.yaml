# TFLE Server Training Config
# One proposal per step (true TFLE algorithm — traces learn from each decision)
# Edit GPUs, architecture, temperature, etc. to control experiments

server:
  gpus: [0, 1]
  results_dir: "/workspace/tfle/results"
  checkpoint_dir: "/workspace/tfle/checkpoints"

gpu_0:
  - name: "mnist_100k_t020"
    dataset: "mnist"
    architecture: [784, 512, 256, 10]
    steps: 100000
    batch_size: 512
    temperature: 0.20
    min_temperature: 0.001
    cooling: "cosine"
    flip_rate: 0.02
    save_checkpoint: true

  - name: "mnist_500k_long"
    dataset: "mnist"
    architecture: [784, 512, 256, 10]
    steps: 500000
    batch_size: 512
    temperature: 0.20
    min_temperature: 0.001
    cooling: "cosine"
    flip_rate: 0.02
    save_checkpoint: true

  - name: "mnist_500k_low_flip"
    dataset: "mnist"
    architecture: [784, 512, 256, 10]
    steps: 500000
    batch_size: 512
    temperature: 0.15
    min_temperature: 0.0005
    cooling: "cosine"
    flip_rate: 0.01
    save_checkpoint: true

  - name: "ste_baseline_mnist"
    dataset: "mnist"
    architecture: [784, 512, 256, 10]
    type: "ste_baseline"
    steps: 100000
    batch_size: 512

gpu_1:
  - name: "mnist_100k_t010"
    dataset: "mnist"
    architecture: [784, 512, 256, 10]
    steps: 100000
    batch_size: 512
    temperature: 0.10
    min_temperature: 0.0005
    cooling: "cosine"
    flip_rate: 0.02
    save_checkpoint: true

  - name: "cifar10_100k"
    dataset: "cifar10"
    architecture: [3072, 512, 256, 10]
    steps: 100000
    batch_size: 256
    temperature: 0.20
    min_temperature: 0.001
    cooling: "cosine"
    flip_rate: 0.015
    save_checkpoint: true

  - name: "cifar10_500k_long"
    dataset: "cifar10"
    architecture: [3072, 512, 256, 10]
    steps: 500000
    batch_size: 256
    temperature: 0.20
    min_temperature: 0.001
    cooling: "cosine"
    flip_rate: 0.015
    save_checkpoint: true

  - name: "ste_baseline_cifar10"
    dataset: "cifar10"
    architecture: [3072, 512, 256, 10]
    type: "ste_baseline"
    steps: 100000
    batch_size: 256
