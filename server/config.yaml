# TFLE Server Training Config
# Edit this to control what runs on your GPU(s)

server:
  gpus: [0, 1]              # Which GPUs to use (one experiment stream per GPU)
  results_dir: "/workspace/tfle/results"
  checkpoint_dir: "/workspace/tfle/checkpoints"

# Each GPU runs its experiment list sequentially
# Both GPUs run in parallel

gpu_0:
  - name: "mnist_100k_batched"
    dataset: "mnist"
    architecture: [784, 1024, 512, 256, 10]   # ~1.4M params — big enough for GPU
    steps: 100000
    batch_size: 512
    n_proposals: 32          # Evaluate 32 flip proposals at once on GPU
    temperature: 0.20
    min_temperature: 0.001
    cooling: "cosine"
    flip_rate: 0.02
    save_checkpoint: true

  - name: "mnist_500k_batched"
    dataset: "mnist"
    architecture: [784, 1024, 512, 256, 10]
    steps: 500000
    batch_size: 512
    n_proposals: 32
    temperature: 0.20
    min_temperature: 0.001
    cooling: "cosine"
    flip_rate: 0.02
    save_checkpoint: true

  - name: "mnist_500k_low_flip"
    dataset: "mnist"
    architecture: [784, 1024, 512, 256, 10]
    steps: 500000
    batch_size: 512
    n_proposals: 32
    temperature: 0.15
    min_temperature: 0.0005
    cooling: "cosine"
    flip_rate: 0.01
    save_checkpoint: true

  - name: "ste_baseline_mnist"
    dataset: "mnist"
    architecture: [784, 1024, 512, 256, 10]
    type: "ste_baseline"
    steps: 100000
    batch_size: 512

gpu_1:
  - name: "mnist_100k_temp010"
    dataset: "mnist"
    architecture: [784, 1024, 512, 256, 10]
    steps: 100000
    batch_size: 512
    n_proposals: 32
    temperature: 0.10
    min_temperature: 0.0005
    cooling: "cosine"
    flip_rate: 0.02
    save_checkpoint: true

  - name: "cifar10_100k_batched"
    dataset: "cifar10"
    architecture: [3072, 1024, 512, 256, 10]   # ~4.4M params
    steps: 100000
    batch_size: 256
    n_proposals: 16           # Fewer proposals (bigger model)
    temperature: 0.20
    min_temperature: 0.001
    cooling: "cosine"
    flip_rate: 0.015
    save_checkpoint: true

  - name: "cifar10_500k_long"
    dataset: "cifar10"
    architecture: [3072, 1024, 512, 256, 10]
    steps: 500000
    batch_size: 256
    n_proposals: 16
    temperature: 0.20
    min_temperature: 0.001
    cooling: "cosine"
    flip_rate: 0.015
    save_checkpoint: true

  - name: "ste_baseline_cifar10"
    dataset: "cifar10"
    architecture: [3072, 1024, 512, 256, 10]
    type: "ste_baseline"
    steps: 100000
    batch_size: 256
